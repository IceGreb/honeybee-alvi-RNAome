# =============================================================================
#  transRNA pipeline v1.2 — parameters
#  Edit this file. Run from the pipeline directory with:
#    bash run.sh           # fresh run
#    bash run.sh --resume  # resume after failure
#
#  All paths marked <...> must be set to absolute paths on your system
#  before running.
# =============================================================================

# ── Sample sheet ──────────────────────────────────────────────────────────────
sample_sheet: "samples.csv"

# ── Output root ───────────────────────────────────────────────────────────────
outdir: "<path/to/output/directory>"

# ── Reference / annotation files ──────────────────────────────────────────────
invertebrate_phyla: "<path/to/invertebrate_phyla.txt>"

# taxonkit NCBI taxonomy database directory (nodes.dmp, names.dmp etc.)
taxonkit_db: "<path/to/.taxonkit>"

# ── Input data directories ────────────────────────────────────────────────────
# RJ raw reads:      {raw_dir_rj}/{sample}/{sample}_1.fq.gz
raw_dir_rj:       "<path/to/Royal_jelly/raw_reads>"
# ST raw reads:      {raw_dir_st}/{sample}/{sample}_1.fq.gz
raw_dir_st:       "<path/to/Systemic_larval_tissue/raw_reads>"

# Trimmed:           {trimmed_dir}/{sample}_1_trimmed.fq.gz
trimmed_dir:      "<path/to/trimmed_reads>"

# STAR unmapped:     {star_dir}/{sample}/{sample}_Unmapped.out.mate1
star_dir:         "<path/to/STAR/unmapped/output>"

# BBsplit host:      {bbsplit_host_dir}/Filtered_{sample}_2MM_bbsplit_clean1.fq
bbsplit_host_dir: "<path/to/bbsplit/host/filtered>"

# BBsplit antiviral: {bbsplit_virus_dir}/Clean_{sample}_2MM_bbsplit_1.fq
bbsplit_virus_dir: "<path/to/bbsplit/antiviral/filtered>"

# BBsplit MAG-clean: {bbsplit_mags_dir}/no_MAGs_{sample}_2MM_clean1.fq
bbsplit_mags_dir: "<path/to/bbsplit/noMAGs/filtered>"

# Kraken output:     {kraken_dir}/{sample}_2MM_CLEAN_noMAGs_kraken_output_005_.txt
kraken_dir:       "<path/to/kraken/output>"

# BLAST output:      {blast_dir}/{sample}_1.tsv  and  {sample}_2.tsv
blast_dir:        "<path/to/blast/output>"

# ── Filtering thresholds ──────────────────────────────────────────────────────
min_occ: 5      # minimum duplicate count for a read to be a candidate (≥5)
min_len: 18     # minimum alignment/read length in nt (≥18)

# ── Taxonomy priority ─────────────────────────────────────────────────────────
# When a read ID appears in BOTH filtered Kraken and filtered BLAST:
# which tool's taxonomy is used? "blast" = BLAST first (recommended)
priority: "blast"

# ── Taxonomy plot parameters ──────────────────────────────────────────────────
tax_plot_threshold:   0.1    # taxa < this % → folded into Other
tax_plot_max_normals: 10     # max taxa shown per panel (excl. Other/Unclassified)
tax_plot_xbreak:      2.5    # x-axis break point (%)

# ── Skip flags ────────────────────────────────────────────────────────────────
# All false by default. Use `bash run.sh --resume` for simple reruns.
# These flags skip entire sections; useful when you want to regenerate only
# a specific output without re-running the full pipeline.
#
#   skip_count_reports  skip all COUNT_* processes and MAKE_READS_POSTTRIM_TAB.
#                       Also disables AGGREGATE_REPORT (no stats to aggregate).
#                       If taxonomy is still needed, reads_posttrim_tab.tsv is
#                       loaded from outdir/reports/ automatically.
#
#   skip_collapse       skip COLLAPSE_READS and load its outputs from
#                       outdir/collapsed/. Annotation + filtering still runs
#                       because those outputs feed the taxonomy parser.
#
#   skip_extract_fasta  skip EXTRACT_FASTA only (FASTA file not produced).
#
#   skip_taxonomy       skip TAXONOMY_PARSER and PLOT_TAXONOMY.
#
#   skip_length_plot    skip PLOT_LENGTH_DIST only.
#
#   skip_report         skip AGGREGATE_REPORT only.
#
skip_count_reports:  false
skip_collapse:       false
skip_extract_fasta:  false
skip_taxonomy:       false
skip_length_plot:    false
skip_report:         false
